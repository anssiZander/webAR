<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />

  <!-- Important for mobile AR/video behavior -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <meta name="apple-mobile-web-app-capable" content="yes" />

  <title>WebAR Video Gallery</title>

  <!-- A-Frame -->
  <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>

  <!-- AR.js for A-Frame -->
  <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>

  <style>
    html,
    body {
      margin: 0;
      overflow: hidden;
      width: 100%;
      height: 100%;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #000;
    }

    a-scene {
      position: fixed;
      inset: 0;
      z-index: 1;
      background: transparent !important;
    }

    a-scene canvas,
    .a-canvas {
      background: transparent !important;
    }

    #arjs-video,
    body > video:not(#gallery-video) {
      z-index: 0 !important;
      pointer-events: none !important;
    }

    #ui-overlay {
      position: fixed;
      left: 12px;
      top: 12px;
      z-index: 20;
      width: min(310px, calc(100vw - 24px));
      padding: 12px 14px;
      border-radius: 12px;
      background: rgba(0, 0, 0, 0.72);
      color: white;
      box-sizing: border-box;
      backdrop-filter: blur(6px);
    }

    #ui-overlay h1 {
      margin: 0 0 6px 0;
      font-size: 17px;
      font-weight: 700;
    }

    #ui-overlay p {
      margin: 4px 0;
      font-size: 13px;
      line-height: 1.35;
      color: rgba(255, 255, 255, 0.82);
    }

    #status-line {
      margin-top: 8px;
      font-size: 12px;
      color: rgba(255, 255, 255, 0.68);
    }

    #status {
      color: #f0d96a;
      font-weight: 600;
    }

    #button-row {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-top: 10px;
      pointer-events: auto;
    }

    button {
      appearance: none;
      border: 0;
      border-radius: 999px;
      padding: 8px 12px;
      font-size: 13px;
      font-weight: 650;
      color: #111;
      background: white;
      cursor: pointer;
    }

    button.secondary {
      color: white;
      background: rgba(255, 255, 255, 0.18);
    }

    button:active {
      transform: translateY(1px);
    }

    #hint {
      position: fixed;
      left: 50%;
      bottom: 18px;
      transform: translateX(-50%);
      z-index: 15;
      padding: 8px 12px;
      border-radius: 999px;
      background: rgba(0, 0, 0, 0.58);
      color: rgba(255, 255, 255, 0.86);
      font-size: 13px;
      text-align: center;
      pointer-events: none;
      white-space: nowrap;
    }

    .hidden {
      display: none;
    }
  </style>
</head>

<body>
  <div id="ui-overlay">
    <h1>AR Video Gallery</h1>
    <p>Point the camera at the Hiro marker.</p>
    <p>Tap once to enable video playback on mobile browsers.</p>

    <div id="button-row">
      <button id="enable-video-button">Enable video</button>
      <button id="sound-button" class="secondary">Sound: on</button>
      <button id="rewind-button" class="secondary">Restart</button>
    </div>

    <div id="status-line">
      Status: <span id="status">Waiting for marker...</span>
    </div>
  </div>

  <div id="hint">Scan the Hiro marker</div>

  <a-scene
    embedded
    background="transparent: true"
    renderer="antialias: true; alpha: true; logarithmicDepthBuffer: true; precision: mediump;"
    vr-mode-ui="enabled: false"
    arjs="sourceType: webcam; debugUIEnabled: false; trackingMethod: best;">

    <a-assets timeout="10000">
      <!--
        video.mp4 must be in the same folder as this index.html.
        Recommended encoding: MP4 / H.264 / AAC.
      -->
      <video
        id="gallery-video"
        src="./video.mp4"
        preload="auto"
        loop
        playsinline
        webkit-playsinline>
      </video>
    </a-assets>

    <a-marker
      id="main-marker"
      preset="hiro"
      emitevents="true"
      smooth="false">

      <!--
        Marker coordinates:
        - X/Z plane = marker surface
        - Y = height above marker

        The video plane uses marker coordinates directly:
        - centered at marker origin
        - Y offset keeps it above the physical marker surface
        - rotation lays the fixed-size plane flat over the marker
      -->
      <a-entity id="gallery-card" visible="false">
        <!-- Fixed marker-space video surface. Width/height are set once from the video file. -->
        <a-plane
          id="video-surface"
          geometry="primitive: plane; width: 2; height: 1.125"
          position="0 0.07 0"
          rotation="-90 0 0"
          material="
            src: #gallery-video;
            shader: flat;
            side: double;
            transparent: false;
            opacity: 1;
            depthTest: false;
            depthWrite: false;
          ">
        </a-plane>

        <a-text
          id="gallery-label"
          value="Video Gallery"
          align="center"
          color="#ffffff"
          width="1.2"
          position="0 0.075 0.76"
          rotation="-90 0 0"
          scale="0.55 0.55 0.55">
        </a-text>
      </a-entity>
    </a-marker>

    <a-entity camera></a-entity>
  </a-scene>

  <script>
    const marker = document.querySelector("#main-marker");
    const scene = document.querySelector("a-scene");
    const galleryCard = document.querySelector("#gallery-card");
    const video = document.querySelector("#gallery-video");
    const videoSurface = document.querySelector("#video-surface");
    const galleryLabel = document.querySelector("#gallery-label");

    const statusText = document.querySelector("#status");
    const hint = document.querySelector("#hint");

    const enableVideoButton = document.querySelector("#enable-video-button");
    const soundButton = document.querySelector("#sound-button");
    const rewindButton = document.querySelector("#rewind-button");

    let markerVisible = false;
    let videoEnabled = false;
    let soundEnabled = true;
    let lockedVideoAspect = null;

    const VIDEO_TARGET_WIDTH = 2.0;
    const VIDEO_TARGET_HEIGHT = 2.828;
    const VIDEO_SURFACE_Y = 0.07;
    const LABEL_GAP = 0.14;

    function keepPassthroughVisible() {
      if (!scene.renderer) return;

      scene.object3D.background = null;
      scene.renderer.setClearColor(0x000000, 0);
      scene.renderer.domElement.style.background = "transparent";
    }

    function setStatus(message, color = "#f0d96a") {
      statusText.textContent = message;
      statusText.style.color = color;
    }

    function getLockedVideoAspect() {
      if (lockedVideoAspect) return lockedVideoAspect;
      if (!video.videoWidth || !video.videoHeight) return null;

      lockedVideoAspect = video.videoWidth / video.videoHeight;
      return lockedVideoAspect;
    }

    function sizeVideoSurface() {
      const aspect = getLockedVideoAspect();
      if (!aspect) return;

      let width = VIDEO_TARGET_WIDTH;
      let height = width / aspect;

      if (height > VIDEO_TARGET_HEIGHT) {
        height = VIDEO_TARGET_HEIGHT;
        width = height * aspect;
      }

      videoSurface.setAttribute("geometry", {
        primitive: "plane",
        width: width.toFixed(4),
        height: height.toFixed(4)
      });
      videoSurface.setAttribute("position", `0 ${VIDEO_SURFACE_Y} 0`);
      videoSurface.setAttribute("rotation", "-90 0 0");

      galleryLabel.setAttribute("position", `0 ${VIDEO_SURFACE_Y + 0.005} ${(height / 2 + LABEL_GAP).toFixed(4)}`);
      galleryLabel.setAttribute("rotation", "-90 0 0");
    }

    async function tryPlayVideo() {
      if (!videoEnabled) {
        setStatus("Tap Enable video first", "#f0d96a");
        return;
      }

      try {
        await video.play();
        setStatus("Playing", "#7CFF8A");
      } catch (error) {
        setStatus("Playback blocked - tap Enable video again", "#ff7979");
        console.warn("Video play failed:", error);
      }
    }

    function pauseVideo() {
      video.pause();
      setStatus("Marker lost - paused", "#f0d96a");
    }

    async function enableVideoPlayback() {
      /*
        Mobile browsers usually require a user gesture before video playback,
        especially if audio is enabled. This button performs that gesture.
      */
      try {
        video.muted = !soundEnabled;
        await video.play();

        videoEnabled = true;

        if (!markerVisible) {
          video.pause();
        }

        setStatus(markerVisible ? "Playing" : "Video enabled - scan marker", "#7CFF8A");

        if (!markerVisible) {
          video.currentTime = 0;
        }
      } catch (errorWithSound) {
        /*
          If playback with sound is blocked, fall back to muted playback.
          The user can still try Sound: on afterwards.
        */
        try {
          soundEnabled = false;
          video.muted = true;
          soundButton.textContent = "Sound: off";

          await video.play();
          videoEnabled = true;

          if (!markerVisible) {
            video.pause();
            video.currentTime = 0;
          }

          setStatus("Video enabled muted - scan marker", "#7CFF8A");
        } catch (errorMuted) {
          setStatus("Could not enable video", "#ff7979");
          console.warn("Video enable failed:", errorMuted);
        }
      }
    }

    function updateSoundButton() {
      video.muted = !soundEnabled;
      soundButton.textContent = soundEnabled ? "Sound: on" : "Sound: off";
    }

    scene.addEventListener("renderstart", keepPassthroughVisible);
    scene.addEventListener("loaded", keepPassthroughVisible);

    video.addEventListener("loadedmetadata", sizeVideoSurface);

    video.addEventListener("ended", () => {
      video.currentTime = 0;
      if (markerVisible && videoEnabled) {
        tryPlayVideo();
      }
    });

    marker.addEventListener("markerFound", () => {
      markerVisible = true;
      galleryCard.setAttribute("visible", "true");
      hint.classList.add("hidden");

      if (videoEnabled) {
        tryPlayVideo();
      } else {
        setStatus("Marker found - tap Enable video", "#7CFF8A");
      }
    });

    marker.addEventListener("markerLost", () => {
      markerVisible = false;
      galleryCard.setAttribute("visible", "false");
      hint.classList.remove("hidden");

      if (!video.paused) {
        pauseVideo();
      } else {
        setStatus("Waiting for marker...", "#f0d96a");
      }
    });

    enableVideoButton.addEventListener("click", enableVideoPlayback);

    soundButton.addEventListener("click", async () => {
      soundEnabled = !soundEnabled;
      updateSoundButton();

      if (markerVisible && videoEnabled) {
        await tryPlayVideo();
      }
    });

    rewindButton.addEventListener("click", async () => {
      video.currentTime = 0;

      if (markerVisible && videoEnabled) {
        await tryPlayVideo();
      } else {
        setStatus("Restarted - scan marker", "#f0d96a");
      }
    });

    updateSoundButton();
    sizeVideoSurface();
    keepPassthroughVisible();
    setStatus("Waiting for marker...");
  </script>
</body>
</html>
