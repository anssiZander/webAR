<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />

  <!-- Important for mobile AR/video behavior -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <meta name="apple-mobile-web-app-capable" content="yes" />

  <title>WebAR Video Gallery</title>

  <!-- A-Frame -->
  <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>

  <!-- AR.js for A-Frame -->
  <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>

  <style>
    html,
    body {
      margin: 0;
      overflow: hidden;
      width: 100%;
      height: 100%;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #000;
    }

    #ui-overlay {
      position: fixed;
      left: 12px;
      top: 12px;
      z-index: 20;
      width: min(310px, calc(100vw - 24px));
      padding: 12px 14px;
      border-radius: 12px;
      background: rgba(0, 0, 0, 0.72);
      color: white;
      box-sizing: border-box;
      backdrop-filter: blur(6px);
    }

    #ui-overlay h1 {
      margin: 0 0 6px 0;
      font-size: 17px;
      font-weight: 700;
    }

    #ui-overlay p {
      margin: 4px 0;
      font-size: 13px;
      line-height: 1.35;
      color: rgba(255, 255, 255, 0.82);
    }

    #status-line {
      margin-top: 8px;
      font-size: 12px;
      color: rgba(255, 255, 255, 0.68);
    }

    #status {
      color: #f0d96a;
      font-weight: 600;
    }

    #button-row {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-top: 10px;
      pointer-events: auto;
    }

    button {
      appearance: none;
      border: 0;
      border-radius: 999px;
      padding: 8px 12px;
      font-size: 13px;
      font-weight: 650;
      color: #111;
      background: white;
      cursor: pointer;
    }

    button.secondary {
      color: white;
      background: rgba(255, 255, 255, 0.18);
    }

    button:active {
      transform: translateY(1px);
    }

    #hint {
      position: fixed;
      left: 50%;
      bottom: 18px;
      transform: translateX(-50%);
      z-index: 15;
      padding: 8px 12px;
      border-radius: 999px;
      background: rgba(0, 0, 0, 0.58);
      color: rgba(255, 255, 255, 0.86);
      font-size: 13px;
      text-align: center;
      pointer-events: none;
      white-space: nowrap;
    }

    .hidden {
      display: none;
    }
  </style>
</head>

<body>
  <div id="ui-overlay">
    <h1>AR Video Gallery</h1>
    <p>Point the camera at the Hiro marker.</p>
    <p>Tap once to enable video playback on mobile browsers.</p>

    <div id="button-row">
      <button id="enable-video-button">Enable video</button>
      <button id="sound-button" class="secondary">Sound: on</button>
      <button id="rewind-button" class="secondary">Restart</button>
    </div>

    <div id="status-line">
      Status: <span id="status">Waiting for marker…</span>
    </div>
  </div>

  <div id="hint">Scan the Hiro marker</div>

  <a-scene
    embedded
    renderer="antialias: true; alpha: true; precision: mediump;"
    vr-mode-ui="enabled: false"
    arjs="sourceType: webcam; debugUIEnabled: false; trackingMethod: best;">

    <a-assets timeout="10000">
      <!--
        video.mp4 must be in the same folder as this index.html.
        Recommended encoding: MP4 / H.264 / AAC.
      -->
      <video
        id="gallery-video"
        src="./video.mp4"
        preload="auto"
        loop
        playsinline
        webkit-playsinline>
      </video>
    </a-assets>

    <a-marker
      id="main-marker"
      preset="hiro"
      emitevents="true"
      smooth="true"
      smoothCount="5"
      smoothTolerance="0.01"
      smoothThreshold="2">

      <!--
        Marker coordinates:
        - X/Z plane = marker surface
        - Y = height above marker

        The card entity is rotated so its local XY plane lies flat over the marker.
        A4 portrait aspect ratio: 1 : 1.414.
      -->
      <a-entity
        id="gallery-card"
        position="0 0.018 0"
        rotation="-90 0 0"
        visible="false">

        <!-- Opaque A4 canvas/backing plate -->
        <a-plane
          id="a4-canvas"
          width="1.0"
          height="1.414"
          position="0 0 0"
          material="
            color: #111111;
            shader: flat;
            side: double;
            transparent: false;
            opacity: 1;
          ">
        </a-plane>

        <!-- Subtle inner panel behind the video -->
        <a-plane
          width="0.94"
          height="1.34"
          position="0 0 0.002"
          material="
            color: #1d1d1d;
            shader: flat;
            side: double;
            transparent: false;
            opacity: 1;
          ">
        </a-plane>

        <!-- Video surface; JS will resize this to preserve the actual video aspect ratio -->
        <a-video
          id="video-surface"
          src="#gallery-video"
          width="0.92"
          height="0.5175"
          position="0 0 0.006"
          material="
            shader: flat;
            side: double;
            transparent: false;
            opacity: 1;
          ">
        </a-video>

        <!-- Small label area; remove this if you want only the video -->
        <a-text
          id="gallery-label"
          value="Video Gallery"
          align="center"
          color="#ffffff"
          width="1.2"
          position="0 -0.63 0.008"
          scale="0.55 0.55 0.55">
        </a-text>
      </a-entity>
    </a-marker>

    <a-entity camera></a-entity>
  </a-scene>

  <script>
    const marker = document.querySelector("#main-marker");
    const galleryCard = document.querySelector("#gallery-card");
    const video = document.querySelector("#gallery-video");
    const videoSurface = document.querySelector("#video-surface");

    const statusText = document.querySelector("#status");
    const hint = document.querySelector("#hint");

    const enableVideoButton = document.querySelector("#enable-video-button");
    const soundButton = document.querySelector("#sound-button");
    const rewindButton = document.querySelector("#rewind-button");

    let markerVisible = false;
    let videoEnabled = false;
    let soundEnabled = true;

    const A4_CANVAS_WIDTH = 1.0;
    const A4_CANVAS_HEIGHT = 1.414;
    const VIDEO_MAX_WIDTH = 0.92;
    const VIDEO_MAX_HEIGHT = 1.18;

    function setStatus(message, color = "#f0d96a") {
      statusText.textContent = message;
      statusText.style.color = color;
    }

    function fitVideoInsideA4Canvas() {
      const videoWidth = video.videoWidth || 16;
      const videoHeight = video.videoHeight || 9;
      const aspect = videoWidth / videoHeight;

      let width = VIDEO_MAX_WIDTH;
      let height = width / aspect;

      if (height > VIDEO_MAX_HEIGHT) {
        height = VIDEO_MAX_HEIGHT;
        width = height * aspect;
      }

      videoSurface.setAttribute("width", width.toFixed(4));
      videoSurface.setAttribute("height", height.toFixed(4));
    }

    async function tryPlayVideo() {
      if (!videoEnabled) {
        setStatus("Tap Enable video first", "#f0d96a");
        return;
      }

      try {
        await video.play();
        setStatus("Playing", "#7CFF8A");
      } catch (error) {
        setStatus("Playback blocked — tap Enable video again", "#ff7979");
        console.warn("Video play failed:", error);
      }
    }

    function pauseVideo() {
      video.pause();
      setStatus("Marker lost — paused", "#f0d96a");
    }

    async function enableVideoPlayback() {
      /*
        Mobile browsers usually require a user gesture before video playback,
        especially if audio is enabled. This button performs that gesture.
      */
      try {
        video.muted = !soundEnabled;
        await video.play();

        videoEnabled = true;

        if (!markerVisible) {
          video.pause();
        }

        setStatus(markerVisible ? "Playing" : "Video enabled — scan marker", "#7CFF8A");

        if (!markerVisible) {
          video.currentTime = 0;
        }
      } catch (errorWithSound) {
        /*
          If playback with sound is blocked, fall back to muted playback.
          The user can still try Sound: on afterwards.
        */
        try {
          soundEnabled = false;
          video.muted = true;
          soundButton.textContent = "Sound: off";

          await video.play();
          videoEnabled = true;

          if (!markerVisible) {
            video.pause();
            video.currentTime = 0;
          }

          setStatus("Video enabled muted — scan marker", "#7CFF8A");
        } catch (errorMuted) {
          setStatus("Could not enable video", "#ff7979");
          console.warn("Video enable failed:", errorMuted);
        }
      }
    }

    function updateSoundButton() {
      video.muted = !soundEnabled;
      soundButton.textContent = soundEnabled ? "Sound: on" : "Sound: off";
    }

    video.addEventListener("loadedmetadata", fitVideoInsideA4Canvas);

    video.addEventListener("ended", () => {
      video.currentTime = 0;
      if (markerVisible && videoEnabled) {
        tryPlayVideo();
      }
    });

    marker.addEventListener("markerFound", () => {
      markerVisible = true;
      galleryCard.setAttribute("visible", "true");
      hint.classList.add("hidden");

      if (videoEnabled) {
        tryPlayVideo();
      } else {
        setStatus("Marker found — tap Enable video", "#7CFF8A");
      }
    });

    marker.addEventListener("markerLost", () => {
      markerVisible = false;
      galleryCard.setAttribute("visible", "false");
      hint.classList.remove("hidden");

      if (!video.paused) {
        pauseVideo();
      } else {
        setStatus("Waiting for marker…", "#f0d96a");
      }
    });

    enableVideoButton.addEventListener("click", enableVideoPlayback);

    soundButton.addEventListener("click", async () => {
      soundEnabled = !soundEnabled;
      updateSoundButton();

      if (markerVisible && videoEnabled) {
        await tryPlayVideo();
      }
    });

    rewindButton.addEventListener("click", async () => {
      video.currentTime = 0;

      if (markerVisible && videoEnabled) {
        await tryPlayVideo();
      } else {
        setStatus("Restarted — scan marker", "#f0d96a");
      }
    });

    updateSoundButton();
    setStatus("Waiting for marker…");
  </script>
</body>
</html>
