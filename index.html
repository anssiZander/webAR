<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>A-Frame WebAR Demo</title>

<!-- A-Frame Library -->

<script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>

<!-- AR.js for A-Frame -->

<script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>


<style>

body { margin: 0; overflow: hidden; font-family: sans-serif; }

#ui-overlay {

position: absolute;

top: 10px;

left: 10px;

z-index: 10;

background: rgba(0, 0, 0, 0.7);

color: white;

padding: 15px;

border-radius: 8px;

max-width: 250px;

pointer-events: none;

}

.marker-guide {

border: 2px solid #00ff00;

width: 150px;

height: 150px;

position: absolute;

top: 50%;

left: 50%;

transform: translate(-50%, -50%);

pointer-events: none;

opacity: 0.5;

}

</style>

</head>

<body>


<!-- UI Information Overlay -->

<div id="ui-overlay">

<h2 style="margin-top:0">WebAR Demo</h2>

<p>1. Point your camera at a <strong>Hiro Marker</strong>.</p>

<p>2. A 3D interactive box will appear on top of it.</p>

<p style="font-size: 0.8em; color: #aaa;">Status: <span id="status">Waiting for Marker...</span></p>

</div>


<!-- Visual Guide for the User -->

<div class="marker-guide"></div>


<!--

A-Scene setup:

- embedded: keeps it within the div/body

- arjs: initializes the AR engine

- vr-mode-ui: disabled because we are using the phone screen as the view, not a headset

-->

<a-scene

embedded

arjs="sourceType: webcam; debugUIEnabled: false; trackingMethod: best;"

vr-mode-ui="enabled: false">


<!-- Define the Assets (Materials, Models) -->

<a-assets>

<video
id="cube-video"
src="./video.mp4"
preload="auto"
autoplay
loop
muted
playsinline
webkit-playsinline>
</video>

</a-assets>


<!--A-Marker: The anchor for the AR content.

"preset: hiro" uses the standard hiro pattern.

-->

<a-marker preset="hiro" id="main-marker">


<!-- A 3D Box that appears when the marker is found -->

<a-box

position="0 0.5 0"

material="src: #cube-video; shader: flat; color: #FFFFFF; transparent: false; opacity: 1">

</a-box>


<!-- A rotating ring around the base -->

<a-ring

color="#EF2D5E"

radius-inner="0.6"

radius-outer="0.7"

rotation="-90 0 0"

animation="property: scale; from: 1 1 1; to: 1.2 1.2 1.2; dir: alternate; loop: true; dur: 1000">

</a-ring>


</a-marker>


<!-- Static camera that moves according to the marker position -->

<a-entity camera></a-entity>


</a-scene>


<script>

// Simple logic to update the UI status based on marker detection

const marker = document.querySelector('#main-marker');

const statusText = document.querySelector('#status');

const cubeVideo = document.querySelector('#cube-video');


function playCubeVideo() {

cubeVideo.muted = true;

cubeVideo.play().catch((error) => {

console.warn('Video playback was blocked:', error);

});

}


marker.addEventListener('markerFound', () => {

statusText.innerText = "Marker Found!";

statusText.style.color = "#00ff00";

playCubeVideo();

});


marker.addEventListener('markerLost', () => {

statusText.innerText = "Waiting for Marker...";

statusText.style.color = "#aaa";

});


playCubeVideo();

</script>

</body>

</html>
