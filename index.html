<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover"
    />
    <title>A-Frame Marker AR Demo</title>
    <link rel="stylesheet" href="./styles.css" />
    <script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/3.4.8/aframe/build/aframe-ar.js"></script>
    <script src="./app.js" defer></script>
  </head>
  <body>
    <div class="hud">
      <section class="hud__card">
        <p class="eyebrow">Mobile Web AR / A-Frame</p>
        <h1>Marker Demo</h1>
        <p class="copy">
          Point the phone at the bundled tag image. When marker
          <strong>#5</strong> is recognized, a simple primitive stack appears
          anchored on top of it.
        </p>
        <p id="status" class="status status--waiting">Booting camera…</p>
        <div class="actions">
          <a class="link-button" href="./marker.html">Open Marker</a>
        </div>
      </section>
    </div>

    <a-scene
      embedded
      loading-screen="enabled: false"
      renderer="antialias: true; alpha: true; colorManagement: true;"
      vr-mode-ui="enabled: false"
      arjs="sourceType: webcam; debugUIEnabled: false; detectionMode: mono_and_matrix; matrixCodeType: 3x3;"
    >
      <a-marker
        id="marker-root"
        type="barcode"
        value="5"
        emitevents="true"
        smooth="true"
        smooth-count="10"
        smooth-tolerance="0.01"
        smooth-threshold="5"
      >
        <a-entity position="0 0 0">
          <a-circle
            position="0 0.01 0"
            rotation="-90 0 0"
            radius="0.46"
            color="#0f172a"
            material="opacity: 0.82; roughness: 0.72"
          ></a-circle>

          <a-torus
            position="0 0.08 0"
            rotation="90 0 0"
            radius="0.3"
            radius-tubular="0.018"
            color="#facc15"
            material="emissive: #ca8a04; emissiveIntensity: 0.38"
          ></a-torus>

          <a-box
            position="0 0.34 0"
            depth="0.28"
            height="0.28"
            width="0.28"
            color="#38bdf8"
            material="metalness: 0.15; roughness: 0.35"
            animation__spin="property: rotation; to: 360 360 0; dur: 4200; loop: true; easing: linear"
            animation__float="property: position; from: 0 0.28 0; to: 0 0.42 0; dur: 1400; dir: alternate; loop: true; easing: easeInOutSine"
          ></a-box>

          <a-cone
            position="0 0.62 0"
            radius-bottom="0.08"
            radius-top="0.01"
            height="0.18"
            color="#fb7185"
            animation__pulse="property: scale; from: 1 1 1; to: 1.15 1.15 1.15; dur: 900; dir: alternate; loop: true; easing: easeInOutSine"
          ></a-cone>

          <a-entity light="type: ambient; intensity: 0.8; color: #ffffff"></a-entity>
          <a-entity
            position="0 1 0.4"
            light="type: point; intensity: 1.1; color: #fff7ed; distance: 3"
          ></a-entity>
        </a-entity>
      </a-marker>

      <a-entity camera></a-entity>
    </a-scene>
  </body>
</html>
